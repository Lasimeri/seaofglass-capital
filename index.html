<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sea of glass - capital</title>
  <meta property="og:title" content="sea of glass - capital">
  <meta property="og:description" content="local LLM inference - zero trust, in-browser">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1><span>sea of glass</span> / capital</h1>
    <p class="subtitle">local LLM inference - zero trust, in-browser</p>

    <div id="status"></div>

    <div class="engine-row">
      <div class="engine-info">
        <span id="engine-label">no engine loaded</span>
        <span id="engine-stats"></span>
      </div>
      <div class="engine-controls">
        <button id="load-btn" class="engine-btn">load model</button>
      </div>
    </div>

    <div class="chat-frame">
      <div id="chat-messages" class="chat-messages">
        <div class="chat-empty">load an engine to start</div>
      </div>
    </div>

    <div class="input-row">
      <textarea id="chat-input" placeholder="type a message..." rows="2" disabled></textarea>
      <button id="send-btn" disabled>send</button>
    </div>

    <div class="log-box">
      <div class="log-header">log</div>
      <div id="log" class="log-body"></div>
    </div>
  </div>

  <script type="module" src="js/main.js?v=1"></script>
</body>
</html>
