<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sea of glass - archive</title>
  <meta property="og:title" content="sea of glass - archive">
  <meta property="og:description" content="encrypted web archive — zero trust">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header>
      <h1>archive <span>sea of glass</span></h1>
      <p class="subtitle">encrypted web archive &mdash; zero trust</p>
    </header>

    <!-- Status -->
    <div id="status" class="status"></div>

    <!-- Home section — archive or view a URL -->
    <div id="home-section">
      <div class="capture-row">
        <input type="text" id="url-input" class="url-input" placeholder="https://" autocomplete="off" spellcheck="false">
        <button id="capture-btn">archive</button>
      </div>

      <!-- Progress log -->
      <div class="log-box">
        <div class="log-header">log</div>
        <div id="log" class="log-body"></div>
      </div>
    </div>

    <!-- View section — archived page display -->
    <div id="view-section" class="hidden">
      <div class="archive-meta">
        <div id="view-title" class="meta-title"></div>
        <div id="view-url" class="meta-url"></div>
        <div id="view-date" class="meta-date"></div>
      </div>
      <div class="archive-frame">
        <iframe id="view-iframe" sandbox="allow-same-origin"></iframe>
      </div>
    </div>

    <!-- Admin section — after creation -->
    <div id="admin-section" class="hidden">
      <div class="archive-meta">
        <div id="admin-title" class="meta-title"></div>
        <div id="admin-url" class="meta-url"></div>
        <div id="admin-date" class="meta-date"></div>
      </div>

      <div id="admin-content" class="hidden">
        <div class="archive-frame">
          <iframe id="admin-iframe" sandbox="allow-same-origin"></iframe>
        </div>
      </div>

      <div class="share-section">
        <p class="hint">share this link to view the archived page</p>
        <div class="share-row">
          <input type="text" id="admin-share-link" readonly>
          <button id="admin-copy-link">copy</button>
        </div>
        <div class="share-actions">
          <button id="admin-delete" class="danger-btn">delete archive</button>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="js/main.js?v=4"></script>
</body>
</html>
